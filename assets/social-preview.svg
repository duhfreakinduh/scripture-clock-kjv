<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Scripture Clock — King James Version</title><desc id="desc">A dark artisan wood Scripture Clock displaying John 3:16 at 3:16 PM.</desc>
  <defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#150c08"/><stop offset="1" stop-color="#080403"/></linearGradient><linearGradient id="wood" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#7b4222"/><stop offset=".42" stop-color="#32180d"/><stop offset=".75" stop-color="#5b2c16"/><stop offset="1" stop-color="#1d0e08"/></linearGradient><filter id="shadow" x="-30%" y="-30%" width="160%" height="180%"><feDropShadow dx="0" dy="30" stdDeviation="30" flood-color="#000" flood-opacity=".65"/></filter></defs>
  <rect width="1200" height="630" fill="url(#bg)"/><circle cx="600" cy="200" r="440" fill="#c9a15d" opacity=".055"/>
  <g filter="url(#shadow)"><rect x="112" y="60" width="976" height="510" rx="42" fill="url(#wood)" stroke="#c9a15d" stroke-opacity=".5" stroke-width="2"/><rect x="144" y="92" width="912" height="446" rx="26" fill="#110806" stroke="#c9a15d" stroke-opacity=".23" stroke-width="2"/></g>
  <text x="600" y="142" fill="#e5c27b" font-family="Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="5" text-anchor="middle">TIME, TOLD THROUGH THE WORD</text>
  <text x="600" y="255" fill="#f5ecd8" font-family="Georgia, serif" font-size="110" text-anchor="middle">3:16 <tspan fill="#e5c27b" font-family="Arial, sans-serif" font-size="24" font-weight="700">PM</tspan></text><line x1="360" y1="291" x2="840" y2="291" stroke="#c9a15d" stroke-opacity=".4"/>
  <text x="600" y="352" fill="#e5c27b" font-family="Georgia, serif" font-size="45" text-anchor="middle">John 3:16</text><text x="600" y="402" fill="#f5ecd8" font-family="Georgia, serif" font-size="25" text-anchor="middle">“For God so loved the world, that he gave his only begotten Son…”</text><text x="600" y="470" fill="#9d8a6f" font-family="Arial, sans-serif" font-size="17" letter-spacing="2" text-anchor="middle">CHAPTER = HOUR  ·  VERSE = MINUTE  ·  KING JAMES VERSION</text><text x="600" y="608" fill="#695746" font-family="Arial, sans-serif" font-size="16" text-anchor="middle">SCRIPTURE CLOCK</text>
</svg>
